name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            dut-dashboard/frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pyinstaller

      - name: Install root dependencies
        run: npm install

      - name: Install frontend dependencies
        run: npm install --prefix dut-dashboard/frontend

      - name: Validate backend importability
        run: python -m compileall dut-dashboard/backend/app

      - name: Run backend tests
        run: pytest dut-dashboard/backend/tests

      - name: Build frontend
        run: npm run build:web

      - name: Validate packaged backend scaffold
        run: python scripts/build_backend.py
